name: Docker build + scan

# Build all three Docker images on every push to main and on every tag.
# Trivy scans block on HIGH/CRITICAL vulnerabilities. This workflow does
# NOT push images — that's release.yml. Pull requests from forks do not
# run this workflow because Trivy needs registry access for the DB.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write   # for the SARIF upload step

jobs:
  build-scan:
    name: ${{ matrix.image.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: backend
            context: ./backend
            tag: marauder-backend:ci
          - name: frontend
            context: ./frontend
            tag: marauder-frontend:ci
          - name: cfsolver
            context: ./cfsolver
            tag: marauder-cfsolver:ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          push: false
          load: true
          tags: ${{ matrix.image.tag }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,scope=${{ matrix.image.name }},mode=max

      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ matrix.image.tag }}
          format: sarif
          output: trivy-${{ matrix.image.name }}.sarif
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.image.name }}.sarif
          category: trivy-${{ matrix.image.name }}
