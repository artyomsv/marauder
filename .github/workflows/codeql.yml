name: CodeQL

# GitHub's free SAST. Catches XSS, SQL injection, path traversal,
# unsafe deserialization, hard-coded credentials, etc. across both
# Go and TypeScript.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'   # 06:00 UTC Monday

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: go
            build-mode: autobuild
          - language: javascript-typescript
            build-mode: none
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # Enabled query packs:
          #   security-extended  — broader vulnerability rules
          #   security-and-quality — also includes maintainability rules
          queries: security-extended

      - name: Set up Go (for autobuild)
        if: matrix.language == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: false

      - name: Autobuild
        if: matrix.build-mode == 'autobuild'
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'
