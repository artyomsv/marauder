name: CI

# The fast-feedback pipeline. Runs on every PR and on every push to main.
# Should finish in under 3 minutes for a typical change.
#
# Heavyweight things (full compose stack E2E, Trivy on built images,
# multi-arch Docker builds) live in their own workflows so they don't
# block contributors waiting on a typo fix.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# Cancel any in-flight CI for the same ref/PR.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  # ---------------------------------------------------------------- backend
  backend:
    name: Backend (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ['1.23']
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true
          cache-dependency-path: backend/go.sum

      - name: go mod download
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: go test (race + coverage)
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1

      - name: govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: ${{ matrix.go }}
          work-dir: backend

  # ---------------------------------------------------------------- backend lint
  backend-lint:
    name: Backend lint (golangci-lint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: backend
          args: --timeout=5m

  # ---------------------------------------------------------------- cfsolver
  cfsolver:
    name: cfsolver build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cfsolver
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
          cache-dependency-path: cfsolver/go.sum

      - name: go mod download
        run: go mod download

      - name: go build
        run: go build ./...

      - name: go vet
        run: go vet ./...

  # ---------------------------------------------------------------- frontend
  frontend:
    name: Frontend (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['22']
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci
        run: npm ci --no-audit --no-fund

      - name: typecheck
        run: npm run typecheck

      - name: build
        run: npm run build

      - name: Bundle size summary
        run: |
          if [ -d dist/assets ]; then
            find dist/assets -maxdepth 1 -type f -printf '%s\t%p\n' | sort -rn
          fi
