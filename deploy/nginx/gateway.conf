# Marauder gateway — fronts backend + frontend on a single host port.
#
# Exposed on 6688 to the host.

upstream marauder_backend {
    server backend:8679;
}

upstream marauder_frontend {
    server frontend:8081;
}

server {
    listen 6688;
    server_name _;

    client_max_body_size 16m;

    # --- Security headers ---
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;

    # --- API ---
    location /api/ {
        proxy_pass         http://marauder_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-ID      $request_id;
        proxy_read_timeout 60s;
    }

    # --- Health / ready passthrough for external monitoring ---
    location = /health { proxy_pass http://marauder_backend/health; }
    location = /ready  { proxy_pass http://marauder_backend/ready;  }

    # --- Frontend (SPA) ---
    location / {
        proxy_pass         http://marauder_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
