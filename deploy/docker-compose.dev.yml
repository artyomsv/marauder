# Development overlay for Marauder.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# What it does differently from the production stack:
#   - publishes the postgres, backend, and frontend ports directly to
#     the host so developers can hit them without going through nginx;
#   - starts qBittorrent and Transmission containers so tracker-to-client
#     integration tests can run end-to-end against real clients.
#
# None of these services are exposed in production.
#
# All HOST-side ports stay in the 34xxx range per the local-port-ranges
# rule (host-exposed ports must be 30000-49999). Container-internal
# ports (right side of the mapping) keep their conventional values.

services:
  db:
    ports:
      - "${MARAUDER_DEV_DB_PORT:-34432}:5432"

  backend:
    ports:
      - "${MARAUDER_DEV_BACKEND_PORT:-34081}:8679"

  frontend:
    ports:
      - "${MARAUDER_DEV_FRONTEND_PORT:-34001}:8081"

  # Real qBittorrent for integration testing.
  # Web UI: http://localhost:34611 (default user "admin", password in
  # logs on first start).
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    restart: unless-stopped
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: "Etc/UTC"
      WEBUI_PORT: "6611"
    volumes:
      - qbit_config:/config
      - qbit_downloads:/downloads
    ports:
      - "${MARAUDER_DEV_QBIT_PORT:-34611}:6611"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # Real Transmission for integration testing.
  transmission:
    image: lscr.io/linuxserver/transmission:latest
    restart: unless-stopped
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: "Etc/UTC"
    volumes:
      - transmission_config:/config
      - transmission_downloads:/downloads
    ports:
      - "${MARAUDER_DEV_TRANSMISSION_PORT:-34091}:9091"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  qbit_config:
  qbit_downloads:
  transmission_config:
  transmission_downloads:
