# Marauder — production-ish local stack
#
# Bring it up with:
#   cp .env.example .env
#   # edit .env, set MARAUDER_MASTER_KEY to a 32-byte base64 value
#   docker compose up -d
#
# Open: http://localhost:34080
#
# Host port allocation lives in the 34xxx range per the local-port-ranges
# rule (host-exposed ports must be 30000-49999). Container-internal ports
# stay at conventional values (gateway listens on 6688 inside the
# container). Override the host port with MARAUDER_HOST_PORT in .env.

services:
  db:
    # Tracks the 18.x line. Currently resolves to 18.3; will roll forward
    # to 18.4 automatically when the upstream alpine tag is published.
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-marauder}
      POSTGRES_USER: ${POSTGRES_USER:-marauder}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-marauder}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - marauder_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-marauder} -d ${POSTGRES_DB:-marauder}"]
      interval: 10s
      timeout: 3s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        VERSION: "1.1.0-dev"
    image: marauder-backend:1.1.0-dev
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      MARAUDER_MASTER_KEY: ${MARAUDER_MASTER_KEY}
      MARAUDER_METRICS_TOKEN: ${MARAUDER_METRICS_TOKEN:-}
      MARAUDER_HTTP_ADDR: ":8679"
      MARAUDER_PUBLIC_BASE_URL: ${MARAUDER_PUBLIC_BASE_URL:-http://localhost:34080}
      MARAUDER_LOG_LEVEL: ${MARAUDER_LOG_LEVEL:-info}
      MARAUDER_LOG_JSON: ${MARAUDER_LOG_JSON:-true}
      MARAUDER_CORS_ORIGINS: ${MARAUDER_CORS_ORIGINS:-http://localhost:34080}
      MARAUDER_DB_URL: ${MARAUDER_DB_URL}
      MARAUDER_JWT_ISSUER: ${MARAUDER_JWT_ISSUER:-https://marauder.cc}
      MARAUDER_JWT_AUDIENCE: ${MARAUDER_JWT_AUDIENCE:-marauder-api}
      MARAUDER_ACCESS_TOKEN_TTL: ${MARAUDER_ACCESS_TOKEN_TTL:-15m}
      MARAUDER_REFRESH_TOKEN_TTL: ${MARAUDER_REFRESH_TOKEN_TTL:-720h}
      MARAUDER_SCHEDULER_ENABLED: ${MARAUDER_SCHEDULER_ENABLED:-true}
      MARAUDER_SCHEDULER_WORKERS: ${MARAUDER_SCHEDULER_WORKERS:-8}
      MARAUDER_SCHEDULER_MAX_EPISODES_PER_TICK: ${MARAUDER_SCHEDULER_MAX_EPISODES_PER_TICK:-25}
      MARAUDER_ADMIN_INITIAL_USERNAME: ${MARAUDER_ADMIN_INITIAL_USERNAME:-}
      MARAUDER_ADMIN_INITIAL_PASSWORD: ${MARAUDER_ADMIN_INITIAL_PASSWORD:-}
      MARAUDER_OIDC_ENABLED: ${MARAUDER_OIDC_ENABLED:-false}
      MARAUDER_OIDC_ISSUER: ${MARAUDER_OIDC_ISSUER:-}
      MARAUDER_OIDC_CLIENT_ID: ${MARAUDER_OIDC_CLIENT_ID:-}
      MARAUDER_OIDC_CLIENT_SECRET: ${MARAUDER_OIDC_CLIENT_SECRET:-}
      MARAUDER_OIDC_REDIRECT_URL: ${MARAUDER_OIDC_REDIRECT_URL:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8679/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    image: marauder-frontend:1.1.0-dev
    restart: unless-stopped
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/"]
      interval: 30s
      timeout: 3s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  cfsolver:
    profiles: ["cfsolver"]
    build:
      context: ../cfsolver
      dockerfile: Dockerfile
    image: marauder-cfsolver:1.1.0-dev
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9244/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  gateway:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    ports:
      # Host-side port stays in the 34xxx range (local-port-ranges rule).
      # Container-internal nginx still listens on 6688 — see gateway.conf.
      - "${MARAUDER_HOST_PORT:-34080}:6688"
    volumes:
      - ./nginx/gateway.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:6688/"]
      interval: 30s
      timeout: 3s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  marauder_pgdata:
